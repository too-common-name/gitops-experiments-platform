apiVersion: cluster.open-cluster-management.io/v1beta1
kind: Placement
metadata:
  name: nonprod-placement
  namespace: openshift-gitops
  annotations:
    argocd.argoproj.io/sync-wave: "-3"
spec:
  clusterSets:
    - default
  predicates:
    - requiredClusterSelector:
        labelSelector:
          matchExpressions:
            - key: environment
              operator: In
              values:
                - nonprod
