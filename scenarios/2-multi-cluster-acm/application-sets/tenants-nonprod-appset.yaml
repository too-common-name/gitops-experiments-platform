apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: tenants-nonprod
  namespace: openshift-gitops
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
spec:
  generators:
    - matrix:
        generators:
          - clusterDecisionResource:
              configMapRef: acm-placement
              labelSelector:
                matchLabels:
                  cluster.open-cluster-management.io/placement: nonprod-placement
              requeueAfterSeconds: 180
          - list:
              elements:
                - env: qa
                - env: stage
  template:
    metadata:
      name: 'tenant-{{env}}-{{name}}'
    spec:
      project: ecommerce-platform-project
      source:
        repoURL: 'https://github.com/too-common-name/gitops-experiments-platform'
        targetRevision: HEAD
        path: 'tenants/overlays/{{env}}'
      destination:
        server: '{{server}}'
        namespace: 'ecommerce-{{env}}'
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
