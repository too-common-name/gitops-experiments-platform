apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: pr-demo-root
  namespace: openshift-gitops
spec:
  project: default
  source:
    repoURL: 'https://github.com/too-common-name/gitops-experiments-platform.git'
    targetRevision: HEAD
    path: platform/pr-demo
    directory:
      recurse: true
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: openshift-gitops
  syncPolicy:
    automated:
      prune: true
      selfHeal: true