apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: ecommerce-platform-root
  namespace: openshift-gitops
spec:
  project: default 
  source:
    repoURL: 'https://github.com/too-common-name/gitops-experiments-platform'
    targetRevision: HEAD
    path: platform/management 
    directory:
      recurse: true 
  destination:
    server: https://kubernetes.default.svc
    namespace: openshift-gitops 
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=false