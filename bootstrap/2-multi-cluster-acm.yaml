apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: multi-cluster-acm-root
  namespace: openshift-gitops
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: 'https://github.com/too-common-name/gitops-experiments-platform.git'
    targetRevision: HEAD
    path: scenarios/2-multi-cluster-acm
    directory:
      recurse: true
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: openshift-gitops
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
